server {
    listen 80;
    server_name ~^proposal\.for\.(?<slug>.+)\.florianrolke\.com$;

    root /usr/share/nginx/html/sites/$slug;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# Default server for unmatched
server {
    listen 80 default_server;
    server_name _;

    location / {
        return 404 '<!DOCTYPE html><html><body><h1>Proposal not found</h1></body></html>';
        add_header Content-Type text/html;
    }
}
